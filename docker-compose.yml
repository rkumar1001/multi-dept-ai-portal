services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    volumes:
      - backend-data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "80:3000"
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ""
    depends_on:
      - backend

volumes:
  backend-data:
